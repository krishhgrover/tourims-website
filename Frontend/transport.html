<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <title>MakeMyJourney - Home</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
    <style>
        .tab-btn {
            padding: 10px 15px;
            border: none;
            background: #ddd;
            cursor: pointer;
            border-radius: 6px;
                margin-right: 6px;

        }

        .active-tab {
            background: #ff6d38;
            color: white;
        }
    </style>
</head>
<body style="background-color: #e5eef5;">
    <div style="background-color: #0a1429; text-align: center; padding: 20px 0;">
        <h1 style="color: white; margin: 0; font-style: italic;">MakeMyJourney</h1>
    </div>

    <div class="navbar">
    <a href="home_page.html"><i class="fa-solid fa-house"></i> Home</a>
    <a href="transport.html"><i class="fa-solid fa-bus"></i> Transport</a>
    <a href="packages.html"><i class="fa-solid fa-umbrella-beach"></i> Holiday Packages</a>
    <a href="recommender.html"><i class="fa-solid fa-compass"></i> AI Recommender</a>
    <a href="booking.html"><i class="fa-solid fa-ticket"></i> Manage Booking</a>
    <a href="visa.html"><i class="fa-solid fa-passport"></i> Visa Services</a>
    <a href="offers.html"><i class="fa-solid fa-tags"></i> Offers</a>
</div>

    <!-- MAIN -->
    <div class="container" style="max-width: 1000px; margin-top: 40px;">

        <!-- Tabs -->
<div style="display:flex; justify-content:center; gap:20px; margin-bottom:20px;">
    
    <button id="btnFlight" class="tab-btn active-tab" onclick="switchTransport('flight')">
        <i class="fa-solid fa-plane"></i> Flights
    </button>

    <button id="btnTrain" class="tab-btn" onclick="switchTransport('train')">
        <i class="fa-solid fa-train"></i> Trains
    </button>

    <button id="btnBus" class="tab-btn" onclick="switchTransport('bus')">
        <i class="fa-solid fa-bus"></i> Buses
    </button>

</div>

        <!-- SPLIT BOX -->
        <div style="
            display:flex;
            background:white;
            border-radius:12px;
            overflow:hidden;
            box-shadow:0 8px 20px rgba(0,0,0,0.1);
        ">

            <!-- LEFT IMAGE -->
           <div style="flex:1; min-height:400px;">
    <img id="transportImage"
         src="https://images.unsplash.com/photo-1436491865332-7a61a109cc05?w=800"
         style="width:100%; height:100%; object-fit:cover; display:block;">
</div>

            <!-- RIGHT FORM -->
            <div style="flex:1; padding:25px;">

                <h2 style="margin-top:0; color:#0a1429;">Book Your Journey</h2>

                <form onsubmit="return searchTransport(event)">

                    <div style="display: flex; gap: 10px;">
                        <div style="flex: 1;">
                            <label>From:</label><br>
                            <input type="text" id="travelFrom" required placeholder="Leaving from..." style="width: 100%; padding: 10px;">
                        </div>
                        <div style="flex: 1;">
                            <label>To:</label><br>
                            <input type="text" id="travelTo" required placeholder="Going to..." style="width: 100%; padding: 10px;">
                        </div>
                    </div>

                    <div style="display: flex; gap: 10px; margin-top: 15px;">
                        <div style="flex: 1;">
                            <label>Departure Date:</label><br>
                            <input type="date" id="travelDate" required style="width: 100%; padding: 10px;">
                        </div>
                        <div style="flex: 1;">
                            <label>Passengers:</label><br>
                            <input type="number" id="travelPax" required min="1" max="10" value="1" style="width: 100%; padding: 10px;">
                        </div>
                    </div>

                    <div style="margin-top: 15px;">
                        <label id="classLabel">Select Class/Type:</label><br>
                        <select id="travelClass" style="width: 100%; padding: 10px;">
                            <option value="economy">Economy Class</option>
                            <option value="business">Business Class</option>
                            <option value="first">First Class</option>
                        </select>
                    </div>

                    <hr style="margin: 20px 0;">

                    <input type="submit" id="searchBtn" value="Search Flights"
                        style="width: 100%; background:#ff6d38; color:white; padding:12px; border:none; border-radius:6px; cursor:pointer;">
                </form>

            </div>
        </div>

        <div id="transportResult" style="margin-top: 20px; text-align: center; color: #065af3; font-weight: bold;"></div>
    </div>

    <!-- INTERNAL JS -->
    <script>
        function switchTransport(type) {

            // Remove active class
            document.getElementById("btnFlight").classList.remove("active-tab");
            document.getElementById("btnTrain").classList.remove("active-tab");
            document.getElementById("btnBus").classList.remove("active-tab");

            // Add active class
            document.getElementById("btn" + capitalize(type)).classList.add("active-tab");

            const img = document.getElementById("transportImage");

            if (type === "flight") {
                img.src = "https://static.vecteezy.com/system/resources/thumbnails/020/141/626/small/plane-in-the-sky-passenger-commercial-plane-flying-above-the-clouds-concept-of-fast-travel-vacation-and-business-photo.jpg";
                document.getElementById("searchBtn").value = "Search Flights";
            }
            else if (type === "train") {
                img.src = "https://images.moneycontrol.com/static-mcnews/2017/02/Bullet_train_rail_railways_770x433-630x354.jpg?impolicy=website&width=770&height=431";
                document.getElementById("searchBtn").value = "Search Trains";
            }
            else if (type === "bus") {
                img.src = "https://chariot-electricbus.com/wp-content/uploads/2023/03/Electric-buses-report-2022-2031-scaled.jpg";
                document.getElementById("searchBtn").value = "Search Buses";
            }
        }

        function capitalize(str){
            return str.charAt(0).toUpperCase() + str.slice(1);
        }
    </script>

</body>
</html>
