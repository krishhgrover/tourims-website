<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>
<body>
    <div class="container">
        <marquee style="color: #d90429; font-weight: bold; background: #fff0f0; padding: 10px; border-radius: 5px;">
            FLASH SALE: Get Flat 15% OFF on Coastal & Mountain Motorbike Expeditions!
        </marquee>
        
        <center>
            <h2 style="color: #0a1429;">Your Journey Begins Here</h2>
            <p>Explore the world with our premium guided tours.</p>
            <img src="https://images.unsplash.com/photo-1469854523086-cc02fe5d8800?w=800&h=300&fit=crop" width="100%" style="border-radius:10px; border: 2px solid #0a1429;">
            
            <hr style="margin: 40px 0; border: 1px solid #eee;">

            <div id="globalBox" onmouseover="revealGlobalTrip()" onmouseout="hideGlobalTrip()" style="border: 3px dashed #065af3; padding: 40px; border-radius: 10px; background-color: #f2f6fa; cursor: pointer; transition: all 0.3s;">
                <h2 id="globalTitle">🌍 Hover to Discover a Global Trip!</h2>
                <p id="globalText">Move your mouse here to reveal a randomly selected world tour from our secret database.</p>
            </div>
        </center>
    </div>
</body>
</html>
