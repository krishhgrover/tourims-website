<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <title>MakeMyJourney - Home</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>
<body style="background-color: #e5eef5;">
    <div style="background-color: #0a1429; text-align: center; padding: 20px 0;">
        <h1 style="color: white; margin: 0; font-style: italic;">MakeMyJourney</h1>
    </div>

    <div class="navbar">
    <a href="home_page.html"><i class="fa-solid fa-house"></i> Home</a>
    <a href="transport.html"><i class="fa-solid fa-bus"></i> Transport</a>
    <a href="packages.html"><i class="fa-solid fa-umbrella-beach"></i> Holiday Packages</a>
    <a href="recommender.html"><i class="fa-solid fa-compass"></i> AI Recommender</a>
    <a href="booking.html"><i class="fa-solid fa-ticket"></i> Manage Booking</a>
    <a href="visa.html"><i class="fa-solid fa-passport"></i> Visa Services</a>
    <a href="offers.html"><i class="fa-solid fa-tags"></i> Offers</a>
</div>

    <div class="container" style="margin-top: 20px;">
        <h2>Traveler Details & Payment</h2>
        <p style="color: #666;">Please enter details exactly as they appear on your government ID.</p>
        
        <div style="background: #f8f9fa; padding: 20px; border-radius: 8px; border: 1px solid #e1e1e1;">
            <form onsubmit="submitBooking(event)">
                <p>
                    <label>Primary Traveler Name (As per Passport/ID):</label><br>
                    <input type="text" id="pnrName" style="width: 100%; padding: 10px; margin-top: 5px;" placeholder="e.g. JOHN DOE">
                    <span id="nameErr" class="error"></span>
                </p>
                <p>
                    <label>Age (21-89):</label><br>
                    <input type="text" id="pnrAge" style="width: 100%; padding: 10px; margin-top: 5px;" placeholder="e.g. 25">
                    <span id="ageErr" class="error"></span>
                </p>
                <p>
                    <label>Mobile Number (Strictly 10 digits):</label><br>
                    <input type="text" id="pnrPhone" maxlength="10" style="width: 100%; padding: 10px; margin-top: 5px;" placeholder="e.g. 9876543210">
                    <span id="phoneErr" class="error"></span>
                </p>
                <p>
                    <label>Email Address (Only @gmail.com allowed):</label><br>
                    <input type="email" id="pnrEmail" required style="width: 100%; padding: 10px; margin-top: 5px;" placeholder="user@gmail.com">
                    <span id="emailErr" class="error"></span>
                </p>
                <hr style="margin: 20px 0; border: 1px solid #ccc;">
                <input type="submit" class="btn-primary" value="Proceed to Secure Payment">
            </form>
        </div>
    </div>

    <script>
    fetch("navbar.html")
        .then(response => response.text())
        .then(data => {
            document.getElementById("navbar").innerHTML = data;
        });
</script>
<script>
async function submitBooking(event) {
    event.preventDefault();

    const data = {
        name: document.getElementById("pnrName").value,
        age: document.getElementById("pnrAge").value,
        phone: document.getElementById("pnrPhone").value,
        email: document.getElementById("pnrEmail").value
    };

    const response = await fetch("/book", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
    });

    const result = await response.text();
    alert(result);
}
</script>
</body>
</html>
